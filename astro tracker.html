<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MiniTrack LX3 Polar Aligner</title>
    <!-- Tailwind CSS für schnelles, sauberes Prototyping -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* Extrem wichtig für die Erhaltung der Dunkeladaption im Feld */
        .astro-night-mode {
            color: #ff2222;
            text-shadow: 0 0 4px rgba(255, 0, 0, 0.6);
        }
        /* Verwandelt den Kamera-Feed in ein rein monochromatisches Rotlichtbild */
        .astro-camera {
            filter: grayscale(1) sepia(1) hue-rotate(-50deg) saturate(8) brightness(0.4);
        }
    </style>
</head>
<body class="bg-black text-red-600 font-mono select-none overflow-hidden fixed inset-0 w-full h-full">

    <!-- Hintergrund-Kamera-Stream -->
    <video id="cameraView" autoplay playsinline muted class="absolute inset-0 w-full h-full object-cover opacity-40 astro-camera z-0"></video>

    <!-- UI Overlay -->
    <div class="absolute inset-0 z-10 flex flex-col justify-between p-4 bg-gradient-to-b from-black/50 via-transparent to-black/80 pointer-events-none">
        
        <!-- Header & System-Status -->
        <header class="w-full bg-black/70 p-3 rounded-lg border border-red-900/50 backdrop-blur-sm pointer-events-auto">
            <h1 class="text-center font-bold tracking-wider text-sm astro-night-mode">MINITRACK LX3 POLAR ALIGNER</h1>
            <div class="grid grid-cols-2 gap-2 text-[10px] mt-2 border-t border-red-900/30 pt-2">
                <div>LAT: <span id="valLat" class="text-white">Suche...</span></div>
                <div>LON: <span id="valLon" class="text-white">Suche...</span></div>
                <div>LST: <span id="valLST" class="text-white">--:--:--</span></div>
                <div>POLARIS HA: <span id="valHA" class="text-white">--h --m</span></div>
            </div>
        </header>

        <!-- Haupt-Fadenkreuz (Polarscope-Ansicht) -->
        <main class="flex-1 flex items-center justify-center relative my-4">
            <svg id="polarscope" class="w-72 h-72 sm:w-80 sm:h-80 opacity-80" viewBox="0 0 200 200">
                <!-- Äußeres Fadenkreuz -->
                <line x1="100" y1="10" x2="100" y2="190" stroke="#990000" stroke-width="0.5" stroke-dasharray="2,2"/>
                <line x1="10" y1="100" x2="190" y2="100" stroke="#990000" stroke-width="0.5" stroke-dasharray="2,2"/>
                
                <!-- Zentraler Himmelsnordpol (NCP) -->
                <circle cx="100" cy="100" r="2" fill="#ff0000"/>
                <circle cx="100" cy="100" r="10" stroke="#ff0000" stroke-width="0.5" fill="none"/>
                
                <!-- Polaris-Bahn (Radius entspricht der aktuellen Polar-Distanz von ca. 0.72°) -->
                <circle cx="100" cy="100" r="65" stroke="#660000" stroke-width="0.75" stroke-dasharray="4,2" fill="none"/>
                
                <!-- Soll-Position für Polaris (Dynamisch berechnet) -->
                <circle id="polarisTarget" cx="100" cy="35" r="4" fill="#00ff00" class="animate-pulse shadow-lg shadow-green-500/50"/>
                
                <!-- Aktuelle Geräte-Ausrichtung (Virtueller NCP) -->
                <g id="devicePointer" transform="translate(100,100)">
                    <circle cx="0" cy="0" r="6" stroke="#ff0000" stroke-width="1.5" fill="none"/>
                    <line x1="-12" y1="0" x2="12" y2="0" stroke="#ff0000" stroke-width="1"/>
                    <line x1="0" y1="-12" x2="0" y2="12" stroke="#ff0000" stroke-width="1"/>
                </g>
            </svg>

            <!-- 3D-Ausrichthilfe / Dynamische Richtungsanweisungen -->
            <div id="alignmentGuidance" class="absolute bottom-2 inset-x-0 text-center px-4">
                <div id="guideBox" class="bg-black/80 border border-red-700 p-2 rounded text-xs inline-block mx-auto backdrop-blur-md">
                    Initalisiere Sensoren...
                </div>
            </div>
        </main>

        <!-- Footer & Interaktions-Buttons -->
        <footer class="w-full flex flex-col gap-2 pointer-events-auto">
            <div id="perfectBadge" class="hidden text-center bg-green-900/80 text-green-400 font-bold p-2 rounded border border-green-500 animate-bounce text-xs tracking-widest">
                ✓ PERFECT ALIGNMENT LOCKED
            </div>
            
            <button id="btnInit" class="w-full bg-red-950 hover:bg-red-900 active:bg-red-800 text-red-200 font-bold p-3 rounded-lg border border-red-600 text-xs tracking-wider transition-colors shadow-lg shadow-red-950/50">
                SYSTEM INITIALISIEREN (SENSOREN & KAMERA)
            </button>
        </footer>
    </div>

    <script>
        // --- KONSTANTEN & KOORDINATEN (EPOCHE J2026) ---
        // Polaris Rektaszension (RA) driftet durch Präzession. Für 2026 nutzen wir einen präzisen Mittelwert.
        const POLARIS_RA = 3.065; // In Dezimalstunden (~3h 03m 54s)
        const POLARIS_DIST_DEG = 0.725; // Aktueller Abstand zum wahren NCP im Jahr 2026

        // Sensor-Glättungsfaktor (Low-Pass-Filter: 0.1 = Träge/Stabil, 0.9 = Direkt/Zappelig)
        const FILTER_FACTOR = 0.15;

        // Zustandsspeicher
        let state = {
            lat: 52.52,  // Default (Berlin)
            lon: 13.40,
            currentAlpha: 0,
            currentBeta: 0,
            currentGamma: 0,
            filteredAzimuth: 0,
            filteredAltitude: 0,
            hasSensors: false
        };

        const dom = {
            btnInit: document.getElementById('btnInit'),
            cameraView: document.getElementById('cameraView'),
            valLat: document.getElementById('valLat'),
            valLon: document.getElementById('valLon'),
            valLST: document.getElementById('valLST'),
            valHA: document.getElementById('valHA'),
            polarisTarget: document.getElementById('polarisTarget'),
            devicePointer: document.getElementById('devicePointer'),
            guideBox: document.getElementById('guideBox'),
            perfectBadge: document.getElementById('perfectBadge')
        };

        // --- MATHEMATISCHE KERN-ALGORITHMEN ---

        /**
         * Berechnet die Local Sidereal Time (LST) für astronomische Ephemeriden.
         * Basiert auf der Julianischen Datumskalkulation ab J2000.0.
         */
        function calculateLST(lon, date) {
            const time = date.getTime();
            // Julianisches Datum für die aktuelle Epoche berechnen
            const julianDate = (time / 86400000) + 2440587.5;
            const d = julianDate - 2451545.0; // Tage seit J2000.0

            // Greenwich Mean Sidereal Time (GMST) Formel nach IAU Standard
            let gmst = 18.697374558 + 24.06570982441908 * d;
            gmst = gmst % 24;
            if (gmst < 0) gmst += 24;

            // Lokale Sternzeit über den Längengrad bestimmen (15 Grad entsprechen 1 Stunde)
            let lst = gmst + (lon / 15.0);
            lst = lst % 24;
            if (lst < 0) lst += 24;
            
            return lst;
        }

        /**
         * Berechnet den Stundenwinkel (Hour Angle) und transformiert ihn in 2D-Scope-Koordinaten.
         */
        function updatePolarisPosition() {
            const now = new Date();
            const lst = calculateLST(state.lon, now);
            
            // Stundenwinkel (HA): Gibt an, wie weit Polaris westlich des Meridians steht
            let ha = lst - POLARIS_RA;
            if (ha < 0) ha += 24;

            // UI Updates
            dom.valLST.textContent = formatTime(lst);
            dom.valHA.textContent = formatTime(ha).substring(0, 5) + "h";

            // Umrechnung in Bogenmaß für die trigonometrische Platzierung im Polarscope
            // Im Sucher steht Polaris bei HA = 0h unten (Untere Kulmination im klassischen Kepler-Fernrohr).
            // Da wir hier die echte Himmelsgeometrie per Frontkamera spiegeln, gilt:
            // HA = 0h (Norden) ist oben, HA = 6h ist links (Westen).
            const angleRad = (ha / 24.0) * 2 * Math.PI - (Math.PI / 2);
            
            // Radius im SVG-Scope beträgt 65 Einheiten
            const radius = 65;
            const targetX = 100 + radius * Math.cos(angleRad);
            const targetY = 100 + radius * Math.sin(angleRad);

            dom.polarisTarget.setAttribute('cx', targetX);
            dom.polarisTarget.setAttribute('cy', targetY);
        }

        // --- SENSORVERARBEITUNG & TIEFPASSFILTER ---

        function handleOrientation(event) {
            // Kompass-Heading (Alpha). Nutzt webkitCompassHeading falls auf iOS vorhanden
            let rawAzimuth = event.webkitCompassHeading || (360 - event.alpha);
            let rawAltitude = event.beta; // Pitch entspricht der Polhöhe auf der LX3-Platte

            if (rawAzimuth === undefined || rawAltitude === undefined) return;

            // Tiefpassfilter (Low-Pass-Filter) zur Rauschunterdrückung
            // Verhindert das typische Zittern der mobilen MEMS-Sensoren im Feld
            state.filteredAzimuth = (rawAzimuth * FILTER_FACTOR) + (state.filteredAzimuth * (1 - FILTER_FACTOR));
            state.filteredAltitude = (rawAltitude * FILTER_FACTOR) + (state.filteredAltitude * (1 - FILTER_FACTOR));

            processAlignment();
        }

        /**
         * Vergleicht Ist-Werte mit astronomischen Soll-Werten und steuert das User-Interface.
         */
        function processAlignment() {
            // Soll-Werte: Wahres Heading = 0° (Echter Norden), Soll-Höhe = Geografische Breite
            const targetAz = 0;
            const targetAlt = state.lat;

            // Abweichungen berechnen
            let deltaAz = state.filteredAzimuth - targetAz;
            if (deltaAz > 180) deltaAz -= 360;
            if (deltaAz < -180) deltaAz += 360;

            const deltaAlt = state.filteredAltitude - targetAlt;

            // Transformation der Abweichung auf das visuelle Fadenkreuz (Skalierungsfaktor 8)
            const offsetX = 100 - (deltaAz * 8);
            const offsetY = 100 + (deltaAlt * 8);
            
            // Begrenzung innerhalb des Scopes
            const clampedX = Math.max(10, Math.min(190, offsetX));
            const clampedY = Math.max(10, Math.min(190, offsetY));
            dom.devicePointer.setAttribute('transform', `translate(${clampedX}, ${clampedY})`);

            // Generierung der präzisen Korrekturpfeile für die Mechanik
            let instructions = [];
            
            if (Math.abs(deltaAz) > 0.1) {
                instructions.push(deltaAz > 0 ? "Stativ nach LINKS (Westen) drehen" : "Stativ nach RECHTS (Osten) drehen");
            }
            if (Math.abs(deltaAlt) > 0.1) {
                instructions.push(deltaAlt > 0 ? "Höhenwiege STEILER (nach oben)" : "Höhenwiege FLACHER (nach unten)");
            }

            // Erkennung des perfekten Einrastens (Präzision unter 0.1 Grad Abweichung)
            if (Math.abs(deltaAz) <= 0.1 && Math.abs(deltaAlt) <= 0.1) {
                dom.guideBox.innerHTML = "<span class='text-green-400 font-bold'>!!! AUSRICHTUNG PERFEKT !!!</span>";
                dom.guideBox.className = "bg-green-950/90 border border-green-400 p-3 rounded text-sm inline-block mx-auto backdrop-blur-md";
                dom.polarisTarget.setAttribute('fill', '#00ff00');
                dom.perfectBadge.classList.remove('hidden');
                
                // Haptisches Feedback bei Erfolg (sofern vom OS unterstützt)
                if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
            } else {
                dom.perfectBadge.classList.add('hidden');
                dom.polarisTarget.setAttribute('fill', '#990000');
                dom.guideBox.className = "bg-black/90 border border-red-700 p-2 rounded text-xs inline-block mx-auto backdrop-blur-md";
                dom.guideBox.innerHTML = instructions.join("<br>") || "Kalibriere Feineinstellung...";
            }
        }

        // --- HARDWARE INITALISIERUNG & PERMISSIONS ---

        async function initSystem() {
            dom.btnInit.disabled = true;
            dom.btnInit.textContent = "INITIALISIERE RECHTE...";

            // 1. Geolocation API abfragen
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        state.lat = position.coords.latitude;
                        state.lon = position.coords.longitude;
                        dom.valLat.textContent = state.lat.toFixed(4) + "°";
                        dom.valLon.textContent = state.lon.toFixed(4) + "°";
                        updatePolarisPosition();
                    },
                    (err) => {
                        dom.guideBox.innerHTML = "<span class='text-yellow-500'>GPS verweigert. Nutze Standard-Koordinaten (Berlin).</span>";
                    },
                    { enableHighAccuracy: true }
                );
            }

            // 2. Frontkamera-Stream aktivieren
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "user" }, // Explizit Selfie-/Frontkamera parallel zur LX3-Achse
                    audio: false
                });
                dom.cameraView.srcObject = stream;
            } catch (err) {
                console.warn("Kamera konnte nicht gestartet werden:", err);
                dom.guideBox.innerHTML = "Kamera-Fehler. Sensor-Modus aktiv.";
            }

            // 3. Sensor-Berechtigungen anfordern (Explizit wichtig für iOS ab Version 13)
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permissionState = await DeviceOrientationEvent.requestPermission();
                    if (permissionState === 'granted') {
                        window.addEventListener('deviceorientation', handleOrientation, true);
                        startClock();
                    } else {
                        alert('Sensorzugriff wurde blockiert.');
                    }
                } catch (error) {
                    console.error(error);
                }
            } else {
                // Android und Desktop-Browser benötigen keine explizite Permission
                window.addEventListener('deviceorientation', handleOrientation, true);
                startClock();
            }

            dom.btnInit.classList.add('hidden'); // Ausblenden nach Erfolg
        }

        // --- HILFSFUNKTIONEN ---

        function startClock() {
            // Kontinuierliche Aktualisierung der Ephemeriden im Sekundentakt
            setInterval(() => {
                updatePolarisPosition();
            }, 1000);
        }

        function formatTime(decimalHours) {
            const hrs = Math.floor(decimalHours);
            const min = Math.floor((decimalHours - hrs) * 60);
            const sec = Math.floor((((decimalHours - hrs) * 60) - min) * 60);
            return `${String(hrs).padStart(2, '0')}:${String(min).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
        }

        // Event-Listener binden
        dom.btnInit.addEventListener('click', initSystem);
    </script>
</body>
</html>
